<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MarketPulse Pro — Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            font-family: 'Sora', sans-serif;
            background: #000;
        }

        /* ── BLURRED BACKDROP VIDEO ── */
        #bgVideo {
            position: fixed;
            inset: -10%;
            width: 120%;
            height: 120%;
            object-fit: cover;
            z-index: 0;
            filter: blur(55px) brightness(0.4) saturate(1.6);
            transform: scale(1.1);
        }

        /* ── MAIN VIDEO ── */
        #videoWrap {
            position: fixed;
            inset: 0;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-mask-image: radial-gradient(
                ellipse 78% 78% at 50% 50%,
                black 40%,
                rgba(0,0,0,0.95) 52%,
                rgba(0,0,0,0.7) 62%,
                rgba(0,0,0,0.3) 72%,
                transparent 85%
            );
            mask-image: radial-gradient(
                ellipse 78% 78% at 50% 50%,
                black 40%,
                rgba(0,0,0,0.95) 52%,
                rgba(0,0,0,0.7) 62%,
                rgba(0,0,0,0.3) 72%,
                transparent 85%
            );
        }
        #introVideo {
            max-width: 100vw;
            max-height: 100vh;
            width: auto;
            height: auto;
            object-fit: contain;
            display: block;
        }

        /* ── VIGNETTE ── */
        #vignette {
            position: fixed;
            inset: 0;
            z-index: 3;
            pointer-events: none;
            background: radial-gradient(
                ellipse 70% 70% at 50% 50%,
                transparent 30%,
                rgba(0,0,0,0.5) 65%,
                rgba(0,0,0,0.82) 100%
            );
        }

        /* ── BRANDING TOP ── */
        #branding {
            position: fixed;
            top: 28px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            text-align: center;
            animation: fadeDown 0.9s cubic-bezier(0.2,0,0,1) 0.2s both;
            white-space: nowrap;
        }
        @keyframes fadeDown {
            from { opacity: 0; transform: translateX(-50%) translateY(-16px); }
            to   { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        .logo-pill {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 7px 18px 7px 8px;
            border-radius: 50px;
            background: rgba(3, 7, 18, 0.75);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(0, 240, 255, 0.2);
            box-shadow: 0 0 24px rgba(0, 240, 255, 0.08), inset 0 1px 0 rgba(255,255,255,0.06);
        }
        .logo-icon {
            width: 32px; height: 32px;
            border-radius: 9px;
            background: rgba(0, 212, 255, 0.12);
            border: 1px solid rgba(0, 212, 255, 0.28);
            display: flex; align-items: center; justify-content: center;
            font-size: 15px;
        }
        .logo-text {
            font-size: 16px;
            font-weight: 900;
            letter-spacing: -0.03em;
            color: #fff;
            line-height: 1.1;
        }
        .logo-text span { color: #00f0ff; text-shadow: 0 0 18px rgba(0,240,255,0.55); }
        .logo-sub {
            font-size: 8px;
            font-weight: 700;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: rgba(136,153,176,0.75);
            margin-top: 2px;
        }

        /* ── LOGIN CARD ── */
        #loginWrap {
            position: fixed;
            inset: 0;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            background: rgba(5, 12, 28, 0.72);
            backdrop-filter: blur(32px);
            -webkit-backdrop-filter: blur(32px);
            border: 1px solid rgba(0, 240, 255, 0.18);
            border-top: 2px solid rgba(0, 240, 255, 0.55);
            border-radius: 24px;
            padding: 40px 36px 36px;
            box-shadow:
                0 0 60px rgba(0, 240, 255, 0.07),
                0 24px 64px rgba(0, 0, 0, 0.6),
                inset 0 1px 0 rgba(255,255,255,0.06);
            animation: cardRise 0.9s cubic-bezier(0.2,0,0,1) 0.35s both;
        }
        @keyframes cardRise {
            from { opacity: 0; transform: translateY(28px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        .card-eyebrow {
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: rgba(0, 240, 255, 0.6);
            font-family: 'Space Mono', monospace;
            margin-bottom: 6px;
        }
        .card-title {
            font-size: 26px;
            font-weight: 900;
            letter-spacing: -0.04em;
            color: #fff;
            line-height: 1.1;
            margin-bottom: 6px;
        }
        .card-title span { color: #00f0ff; text-shadow: 0 0 20px rgba(0,240,255,0.4); }
        .card-desc {
            font-size: 12px;
            color: rgba(136,153,176,0.75);
            margin-bottom: 30px;
            line-height: 1.5;
        }

        /* ── FIELD ── */
        .field {
            margin-bottom: 16px;
        }
        .field label {
            display: block;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: rgba(136,153,176,0.8);
            margin-bottom: 8px;
            font-family: 'Space Mono', monospace;
        }
        .input-wrap {
            position: relative;
        }
        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
            color: rgba(0, 240, 255, 0.4);
            pointer-events: none;
            transition: color 0.2s;
        }
        .field input {
            width: 100%;
            height: 48px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 0 16px 0 42px;
            font-family: 'Sora', sans-serif;
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            outline: none;
            transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
            letter-spacing: 0.01em;
        }
        .field input::placeholder { color: rgba(136,153,176,0.4); font-weight: 400; }
        .field input:focus {
            border-color: rgba(0, 240, 255, 0.45);
            background: rgba(0, 240, 255, 0.04);
            box-shadow: 0 0 0 3px rgba(0,240,255,0.08), 0 0 20px rgba(0,240,255,0.06);
        }
        .field input:focus + .input-icon,
        .input-wrap:focus-within .input-icon {
            color: rgba(0, 240, 255, 0.75);
        }
        /* password eye toggle */
        .eye-btn {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 14px;
            color: rgba(136,153,176,0.5);
            padding: 4px;
            transition: color 0.2s;
        }
        .eye-btn:hover { color: rgba(0,240,255,0.7); }

        /* ── ERROR MESSAGE ── */
        #errorMsg {
            display: none;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            border-radius: 10px;
            background: rgba(255, 51, 85, 0.1);
            border: 1px solid rgba(255, 51, 85, 0.3);
            margin-bottom: 16px;
            font-size: 12px;
            font-weight: 600;
            color: #ff6b8a;
            animation: shake 0.35s ease;
        }
        #errorMsg.visible { display: flex; }
        @keyframes shake {
            0%,100% { transform: translateX(0); }
            20%      { transform: translateX(-6px); }
            40%      { transform: translateX(6px); }
            60%      { transform: translateX(-4px); }
            80%      { transform: translateX(4px); }
        }

        /* ── SUCCESS STATE ── */
        #successMsg {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 14px;
            border-radius: 10px;
            background: rgba(0, 230, 118, 0.08);
            border: 1px solid rgba(0, 230, 118, 0.3);
            margin-bottom: 16px;
            font-size: 13px;
            font-weight: 700;
            color: #00e676;
            text-align: center;
        }
        #successMsg.visible { display: flex; }
        #successMsg .welcome-name {
            font-size: 18px;
            font-weight: 900;
            color: #fff;
            letter-spacing: -0.02em;
        }

        /* ── LOGIN BUTTON ── */
        #loginBtn {
            width: 100%;
            height: 50px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 50%, #00e5ff 100%);
            color: #030712;
            font-family: 'Sora', sans-serif;
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.25s;
            box-shadow: 0 0 30px rgba(0,212,255,0.3), 0 4px 16px rgba(0,0,0,0.4);
        }
        #loginBtn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.25), transparent);
            opacity: 0;
            transition: opacity 0.25s;
        }
        #loginBtn:hover::before { opacity: 1; }
        #loginBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 40px rgba(0,212,255,0.45), 0 8px 24px rgba(0,0,0,0.5);
        }
        #loginBtn:active { transform: translateY(0) scale(0.98); }
        #loginBtn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .btn-inner { display: flex; align-items: center; justify-content: center; gap: 8px; }

        /* Loading spinner inside button */
        .spinner {
            width: 16px; height: 16px;
            border: 2px solid rgba(3,7,18,0.3);
            border-top-color: #030712;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── DIVIDER ── */
        .divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 20px 0 0;
        }
        .divider-line { flex: 1; height: 1px; background: rgba(255,255,255,0.07); }
        .divider-text { font-size: 9px; font-weight: 700; letter-spacing: 0.12em; color: rgba(136,153,176,0.4); font-family: 'Space Mono', monospace; }

        /* ── BOTTOM STATUS ── */
        .status-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-top: 14px;
        }
        .status-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #00e676;
            box-shadow: 0 0 8px #00e676;
            animation: pulse 1.8s ease-out infinite;
        }
        @keyframes pulse {
            0%   { box-shadow: 0 0 0 0 rgba(0,230,118,0.7); }
            70%  { box-shadow: 0 0 0 6px rgba(0,230,118,0); }
            100% { box-shadow: 0 0 0 0 rgba(0,230,118,0); }
        }
        .status-text {
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: rgba(0,230,118,0.6);
            font-family: 'Space Mono', monospace;
        }

        /* ── TRANSITION FLASH ── */
        #flashOverlay {
            position: fixed;
            inset: 0;
            z-index: 999;
            background: #030712;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.9s ease;
        }
        #flashOverlay.active { opacity: 1; }

        /* Scan line effect */
        .login-card::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 24px;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,240,255,0.01) 2px,
                rgba(0,240,255,0.01) 4px
            );
            pointer-events: none;
        }
    </style>
</head>
<body>

<!-- Blurred backdrop -->
<video id="bgVideo" autoplay muted playsinline preload="auto" loop>
    <source src="gif.mp4" type="video/mp4">
</video>

<!-- Main video — sharp, centered -->
<div id="videoWrap">
    <video id="introVideo" autoplay muted playsinline preload="auto" loop>
        <source src="gif.mp4" type="video/mp4">
    </video>
</div>

<!-- Vignette -->
<div id="vignette"></div>

<!-- Hidden audio -->
<audio id="introAudio" src="music2.webm" preload="auto" loop></audio>

<!-- Top branding -->
<div id="branding">
    <div class="logo-pill">
        <div class="logo-icon">📈</div>
        <div>
            <div class="logo-text">MarketPulse <span>Pro</span></div>
            <div class="logo-sub">8-Strategy Confluence Engine</div>
        </div>
    </div>
</div>

<!-- LOGIN CARD -->
<div id="loginWrap">
    <div class="login-card">

        <div class="card-eyebrow">Secure Access Portal</div>
        <div class="card-title">Welcome <span>Back</span></div>
        <div class="card-desc">Sign in to access your trading dashboard and real-time market analytics.</div>

        <!-- Error message -->
        <div id="errorMsg">
            <span>⚠</span>
            <span id="errorText">Invalid username or password.</span>
        </div>

        <!-- Success message -->
        <div id="successMsg">
            <span>✦ ACCESS GRANTED</span>
            <span class="welcome-name" id="welcomeName"></span>
            <span style="font-size:11px;color:rgba(0,230,118,0.7);font-weight:600">Redirecting to dashboard…</span>
        </div>

        <!-- Username -->
        <div class="field">
            <label for="username">Username</label>
            <div class="input-wrap">
                <input
                    type="text"
                    id="username"
                    placeholder="Enter your username"
                    autocomplete="username"
                    spellcheck="false"
                >
                <span class="input-icon">👤</span>
            </div>
        </div>

        <!-- Password -->
        <div class="field">
            <label for="password">Password</label>
            <div class="input-wrap">
                <input
                    type="password"
                    id="password"
                    placeholder="Enter your password"
                    autocomplete="current-password"
                >
                <span class="input-icon">🔒</span>
                <button class="eye-btn" id="eyeBtn" type="button" title="Show/hide password">👁</button>
            </div>
        </div>

        <!-- Login button -->
        <button id="loginBtn" onclick="handleLogin()">
            <div class="btn-inner">
                <div class="spinner" id="spinner"></div>
                <span id="btnLabel">ACCESS DASHBOARD →</span>
            </div>
        </button>

        <div class="divider">
            <div class="divider-line"></div>
            <div class="divider-text">MARKETPULSE PRO v2.0</div>
            <div class="divider-line"></div>
        </div>

        <div class="status-row">
            <div class="status-dot"></div>
            <div class="status-text">Live Markets · Binance · Kraken</div>
        </div>

    </div>
</div>

<!-- Transition overlay -->
<div id="flashOverlay"></div>

<script>
    const bgVid   = document.getElementById('bgVideo');
    const vidMain = document.getElementById('introVideo');
    const audio   = document.getElementById('introAudio');
    const flash   = document.getElementById('flashOverlay');

    // Sync bg video with main
    vidMain.addEventListener('timeupdate', () => {
        if (bgVid && Math.abs(bgVid.currentTime - vidMain.currentTime) > 0.4) {
            bgVid.currentTime = vidMain.currentTime;
        }
    });

    // Play audio immediately
    audio.volume = 0.75;
    audio.play().catch(() => {
        const unlock = () => {
            audio.play().catch(() => {});
            ['click','touchstart','keydown'].forEach(ev => document.removeEventListener(ev, unlock));
        };
        ['click','touchstart','keydown'].forEach(ev =>
            document.addEventListener(ev, unlock, { passive: true })
        );
    });

    // Eye toggle
    const eyeBtn   = document.getElementById('eyeBtn');
    const pwdInput = document.getElementById('password');
    eyeBtn.addEventListener('click', () => {
        const isHidden = pwdInput.type === 'password';
        pwdInput.type  = isHidden ? 'text' : 'password';
        eyeBtn.textContent = isHidden ? '🙈' : '👁';
    });

    // Enter key support
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') handleLogin();
    });

    // ── Credentials ──
    const USERS = {
        'Imanka':  '1234',
        'Kavindu': '1234'
    };

    let redirected = false;

    function handleLogin() {
        if (redirected) return;

        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const errorEl  = document.getElementById('errorMsg');
        const successEl = document.getElementById('successMsg');
        const btn      = document.getElementById('loginBtn');
        const spinner  = document.getElementById('spinner');
        const btnLabel = document.getElementById('btnLabel');

        // Hide previous messages
        errorEl.classList.remove('visible');
        successEl.classList.remove('visible');

        // Validate empty
        if (!username || !password) {
            showError('Please enter both username and password.');
            return;
        }

        // Check credentials
        if (USERS[username] && USERS[username] === password) {
            // ✅ Success
            btn.disabled = true;
            spinner.style.display = 'block';
            btnLabel.textContent = 'Authenticating…';

            // Save user to localStorage for dashboard greeting
            localStorage.setItem('mp_user', username);

            setTimeout(() => {
                spinner.style.display = 'none';
                btnLabel.textContent = '✦ Authenticated';
                document.getElementById('welcomeName').textContent = `Welcome, ${username}!`;
                successEl.classList.add('visible');

                setTimeout(() => {
                    redirected = true;
                    flash.classList.add('active');
                    setTimeout(() => { window.location.href = 'index.html'; }, 900);
                }, 1200);
            }, 900);

        } else {
            // ❌ Fail
            if (!USERS[username]) {
                showError('Username not found. Try "Imanka" or "Kavindu".');
            } else {
                showError('Incorrect password. Please try again.');
            }
        }
    }

    function showError(msg) {
        const errorEl  = document.getElementById('errorMsg');
        document.getElementById('errorText').textContent = msg;
        errorEl.classList.remove('visible');
        // Force reflow to re-trigger shake animation
        void errorEl.offsetWidth;
        errorEl.classList.add('visible');

        // Shake the input fields
        ['username','password'].forEach(id => {
            const el = document.getElementById(id);
            el.style.borderColor = 'rgba(255,51,85,0.5)';
            setTimeout(() => { el.style.borderColor = ''; }, 1500);
        });
    }
</script>
</body>
</html>
